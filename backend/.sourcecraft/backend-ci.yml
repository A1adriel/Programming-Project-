# CI-сценарий на Sourcecraft для бэкенда
# Запускает линтинг (ruff) и тесты (pytest) при каждом push/PR

name: Backend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check app/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
